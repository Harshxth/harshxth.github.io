<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hero design options · Harshith Gujjeti</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080010;color:#F0EAFF;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body{background-image:linear-gradient(rgba(192,132,252,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(192,132,252,.04) 1px,transparent 1px);background-size:48px 48px}
.wrap{max-width:1400px;margin:0 auto;padding:2rem 1.5rem 4rem}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem}
.title span{color:#C084FC}
.sub{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:#8A6FB8;letter-spacing:.2em}
a.back{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:#C084FC;text-decoration:none;border:1px solid #1A0835;padding:.45rem .9rem;border-radius:6px;letter-spacing:.1em}
a.back:hover{border-color:#C084FC}
.tabs{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;padding-bottom:1.2rem;border-bottom:1px solid #1A0835}
.tab{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;padding:.55rem 1.1rem;border-radius:100px;border:1px solid #1A0835;background:#0D0018;color:#8A6FB8;cursor:pointer;transition:all .2s}
.tab:hover{border-color:#C084FC;color:#C084FC}
.tab.active{background:#C084FC;color:#080010;border-color:#C084FC;box-shadow:0 0 20px rgba(192,132,252,.4)}
.stage{position:relative;width:100%;aspect-ratio:16/9;min-height:380px;background:#0D0018;border:1px solid #1A0835;border-radius:14px;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse 60% 70% at 50% 50%,transparent,rgba(8,0,16,.55) 80%,rgba(8,0,16,.95) 100%);pointer-events:none}
.caption{position:absolute;bottom:1.2rem;left:1.2rem;right:1.2rem;display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;pointer-events:none}
.cap-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:#F0EAFF}
.cap-name span{background:linear-gradient(130deg,#C084FC,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cap-desc{font-family:'DM Sans',sans-serif;color:#9080B0;font-size:.85rem;max-width:420px;line-height:1.5}
.cap-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.2em;color:#C084FC;text-align:right;white-space:nowrap}
.note{margin-top:1.5rem;padding:1rem 1.2rem;background:#0D0018;border:1px solid #1A0835;border-radius:10px;color:#9080B0;font-size:.85rem;line-height:1.6}
.note strong{color:#D4BEEA}
.note .mono{font-family:'JetBrains Mono',monospace;color:#C084FC;font-size:.8rem}
.spec{margin-top:1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.7rem}
.spec div{padding:.85rem 1rem;background:#0D0018;border:1px solid #1A0835;border-radius:8px;font-size:.78rem;color:#9080B0}
.spec div b{display:block;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#8A6FB8;letter-spacing:.15em;margin-bottom:.3rem;text-transform:uppercase}
.spec div span{color:#D4BEEA;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="title"><span>{</span>HG<span>}</span> · hero design options</div>
      <div class="sub">PREVIEW-ONLY · PICK ONE TO SHIP</div>
    </div>
    <a href="index.html" class="back">← back to main</a>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-scene="rag">RAG → Attention</button>
    <button class="tab" data-scene="agents">Agent Graph</button>
    <button class="tab" data-scene="attn">Attention Grid</button>
    <button class="tab" data-scene="pipeline">Token Pipeline</button>
    <span style="flex:1"></span>
    <button class="tab active" data-palette="purple">Purple</button>
    <button class="tab" data-palette="grey">Grey</button>
  </div>

  <div class="stage">
    <canvas id="stage-canvas"></canvas>
    <div class="vignette"></div>
    <div class="caption">
      <div>
        <div class="cap-name">Harshith <span>Gujjeti.</span></div>
        <div class="cap-desc">I <b style="color:#D4BEEA">build</b> production AI systems, <b style="color:#D4BEEA">understand</b> the math that makes them work, and <b style="color:#D4BEEA">ship</b> the ones that move revenue.</div>
      </div>
      <div class="cap-tag" id="cap-tag">RAG RETRIEVAL</div>
    </div>
  </div>

  <div class="note" id="scene-note"></div>
  <div class="spec" id="scene-spec"></div>
</div>

<script>
// Shared canvas, shared renderer. Each scene has its own Three.js Scene object
// and animate() hook. Tab switch disposes old, builds new.
const canvas=document.getElementById('stage-canvas');
const stage=canvas.parentElement;
const GW=()=>stage.offsetWidth,GH=()=>stage.offsetHeight;
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setClearColor(0x000000,0);
function resize(){renderer.setSize(GW(),GH())}
resize();
window.addEventListener('resize',()=>{resize();if(active&&active.camera){active.camera.aspect=GW()/GH();active.camera.updateProjectionMatrix();}});

const smoothstep=(e0,e1,x)=>{const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*(3-2*t);};

// Global palette system — scenes read PAL at build time and listen for changes
const PALETTES={
  purple:{q:0xE879F9,a:0xC084FC,c:0x818CF8,bg:0x7C3AED,trail:0xE879F9,accent:0xA78BFA},
  grey:  {q:0xF3F4F6,a:0xD1D5DB,c:0x6B7280,bg:0x4B5563,trail:0xE5E7EB,accent:0x9CA3AF},
};
let PAL=PALETTES.purple;

let active=null,raf=0,hmx=0,hmy=0,activeId='rag';
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();hmx=((e.clientX-r.left)/r.width-.5)*2;hmy=-((e.clientY-r.top)/r.height-.5)*2;});

function disposeScene(s){
  if(!s)return;
  s.scene.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material){(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose())}});
}

// ─────────────────────────────────────────────────────────
// SCENE 1: RAG RETRIEVAL
// ─────────────────────────────────────────────────────────
// v2 — cinematic RAG with physical chunk attraction, morph transition to
// attention cascade, and answer ejection. Timeline:
//   0.00-0.15  idle breath (ambient drift, query subtle pulse)
//   0.15-0.40  retrieval probe + chunk awakening
//   0.40-0.55  top-K chunks accelerate toward query (gravitational attract)
//   0.55-0.62  convergence flash (chunks collapse into query)
//   0.62-0.70  morph: query text lines dissolve, attention cells materialize
//   0.70-0.85  attention cascade: activations flow top→bottom through stack
//   0.85-0.92  answer ejects toward camera, then settles on the right
//   0.92-1.00  reset, particles resume ambient drift
function buildRAG(){
  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(72,GW()/GH(),.1,500);
  const CAM_WIDE=new THREE.Vector3(0,3,60);
  const CAM_NEAR=new THREE.Vector3(0,0,18);
  const CAM_OUT =new THREE.Vector3(8,0,56);
  camera.position.copy(CAM_WIDE);
  const COL_Q=PAL.q,COL_A=PAL.a,COL_C=PAL.c,COL_T=PAL.trail,COL_ACC=PAL.accent;
  function doc(w,h,col,op,bo){
    const g=new THREE.Group();
    const f=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op}));
    const b=new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-w/2,-h/2,0),new THREE.Vector3(w/2,-h/2,0),new THREE.Vector3(w/2,h/2,0),new THREE.Vector3(-w/2,h/2,0)]),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:bo}));
    g.add(f);g.add(b);return{g,f,b};
  }
  // --- QUERY token (center, the star of the scene) ---
  const QW=8.5,QH=5.0;
  const q=doc(QW,QH,COL_Q,.28,.85);q.g.position.set(0,0,0);
  const qLines=[];
  for(let i=0;i<4;i++){
    const w=[7,5.8,4.4,5.2][i];
    const ln=new THREE.Mesh(new THREE.PlaneGeometry(w,.2),new THREE.MeshBasicMaterial({color:COL_Q,transparent:true,opacity:.55}));
    ln.position.set(-.6,1.4-i*.9,.01);q.g.add(ln);qLines.push(ln);
  }
  scene.add(q.g);

  // --- ATTENTION STACK inside the query (columns of cells that light up like a residual stream) ---
  const attnGroup=new THREE.Group();attnGroup.position.set(0,0,.8);attnGroup.visible=false;
  const COLS=6,ROWS=8,CELL_W=.92,CELL_H=.42,COL_GAP=.2;
  const stackW=COLS*(CELL_W+COL_GAP)-COL_GAP, stackH=ROWS*CELL_H;
  const attnCells=[];
  for(let col=0;col<COLS;col++){
    for(let row=0;row<ROWS;row++){
      const m=new THREE.Mesh(new THREE.PlaneGeometry(CELL_W-.06,CELL_H-.06),new THREE.MeshBasicMaterial({color:COL_ACC,transparent:true,opacity:0}));
      m.position.set(col*(CELL_W+COL_GAP)-stackW/2+CELL_W/2,row*CELL_H-stackH/2+CELL_H/2,0);
      attnGroup.add(m);
      attnCells.push({m,col,row,ph:col*.18+row*.09});
    }
    // column outline (layer boundary)
    const cx=col*(CELL_W+COL_GAP)-stackW/2+CELL_W/2;
    const out=new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(cx-CELL_W/2,-stackH/2,.01),new THREE.Vector3(cx+CELL_W/2,-stackH/2,.01),new THREE.Vector3(cx+CELL_W/2,stackH/2,.01),new THREE.Vector3(cx-CELL_W/2,stackH/2,.01)]),new THREE.LineBasicMaterial({color:COL_Q,transparent:true,opacity:0}));
    attnGroup.add(out);
  }
  // horizontal "flow" lines between columns
  const flowLines=[];
  for(let col=0;col<COLS-1;col++){
    const x1=col*(CELL_W+COL_GAP)-stackW/2+CELL_W/2+CELL_W/2;
    const x2=(col+1)*(CELL_W+COL_GAP)-stackW/2+CELL_W/2-CELL_W/2;
    for(let row=0;row<ROWS;row+=2){
      const y=row*CELL_H-stackH/2+CELL_H/2;
      const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,y,.02),new THREE.Vector3(x2,y,.02)]);
      const mat=new THREE.LineBasicMaterial({color:COL_T,transparent:true,opacity:0});
      attnGroup.add(new THREE.Line(geo,mat));
      flowLines.push({mat,col,row});
    }
  }
  q.g.add(attnGroup);

  // --- ANSWER token (right, emerges from query) ---
  const a=doc(6.5,3.8,COL_A,0,0);a.g.position.set(28,0,0);
  const aL=[];
  for(let i=0;i<3;i++){
    const w=[5,4.4,3.5][i];
    const ln=new THREE.Mesh(new THREE.PlaneGeometry(w,.16),new THREE.MeshBasicMaterial({color:COL_A,transparent:true,opacity:0}));
    ln.position.set(-.4,.9-i*.9,.01);a.g.add(ln);aL.push(ln);
  }
  scene.add(a.g);

  // --- DOCUMENT CHUNKS scattered around the query, NC=70 ---
  const CH=[],NC=70;
  for(let i=0;i<NC;i++){
    const w=1.6+Math.random()*1.9,h=.85+Math.random()*1.1;
    const c=doc(w,h,COL_C,.08,.18);
    const angle=Math.random()*Math.PI*2;
    const radius=14+Math.random()*20;
    const px=Math.cos(angle)*radius+(Math.random()-.5)*6;
    const py=Math.sin(angle)*radius*.55+(Math.random()-.5)*4;
    const pz=-8+Math.random()*18;
    c.g.position.set(px,py,pz);
    const tx=new THREE.Mesh(new THREE.PlaneGeometry(w*.7,.06),new THREE.MeshBasicMaterial({color:COL_C,transparent:true,opacity:.35}));tx.position.z=.01;c.g.add(tx);
    scene.add(c.g);
    CH.push({...c,w,h,bx:px,by:py,bz:pz,ph:Math.random()*Math.PI*2,top:false,rank:-1,trailPts:[]});
  }

  // --- TRAIL SYSTEM: each top-K chunk leaves a fading particle trail as it's pulled to the query ---
  const TRAIL_LEN=24;
  const trails=[];
  for(let i=0;i<8;i++){ // max K=8
    const pts=new Float32Array(TRAIL_LEN*3);
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pts,3));
    const mat=new THREE.LineBasicMaterial({color:COL_T,transparent:true,opacity:0});
    scene.add(new THREE.Line(geo,mat));
    trails.push({geo,mat,history:[]});
  }

  // --- CONVERGENCE FLASH: a bright ring at query when chunks collapse in ---
  const flashPts=[];for(let i=0;i<=48;i++){const a=(i/48)*Math.PI*2;flashPts.push(new THREE.Vector3(Math.cos(a),Math.sin(a),0));}
  const flash=new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(flashPts),new THREE.LineBasicMaterial({color:COL_T,transparent:true,opacity:0,linewidth:2}));
  flash.position.copy(q.g.position);scene.add(flash);

  // --- PROBE ring (retrieval scan wave) ---
  const probePts=[];for(let i=0;i<=64;i++){const a=(i/64)*Math.PI*2;probePts.push(new THREE.Vector3(Math.cos(a),Math.sin(a),0));}
  const probe=new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(probePts),new THREE.LineBasicMaterial({color:COL_Q,transparent:true,opacity:0}));
  probe.position.copy(q.g.position);scene.add(probe);

  // --- AMBIENT particles ---
  const PN=260,pP=new Float32Array(PN*3);
  for(let i=0;i<PN;i++){pP[i*3]=-60+Math.random()*120;pP[i*3+1]=-22+Math.random()*44;pP[i*3+2]=-25+Math.random()*30;}
  const pG=new THREE.BufferGeometry();pG.setAttribute('position',new THREE.BufferAttribute(pP,3));
  const particles=new THREE.Points(pG,new THREE.PointsMaterial({color:PAL.bg,size:.14,transparent:true,opacity:.45}));
  scene.add(particles);

  // --- CYCLE ---
  const CYCLE=12;
  const K=8;
  let t=0,cy=-1;

  function lerpVec(a,b,u){return new THREE.Vector3(a.x+(b.x-a.x)*u,a.y+(b.y-a.y)*u,a.z+(b.z-a.z)*u);}

  return {scene,camera,animate:()=>{
    t+=.013;
    const cp=(t%CYCLE)/CYCLE,nc=Math.floor(t/CYCLE);
    if(nc!==cy){
      cy=nc;
      const idx=[...Array(CH.length).keys()].sort(()=>Math.random()-.5).slice(0,K);
      CH.forEach(c=>{c.top=false;c.rank=-1;c.trailPts=[];});
      idx.forEach((id,r)=>{CH[id].top=true;CH[id].rank=r;});
      trails.forEach((tr,i)=>{tr.history=[];tr.chunkIdx=idx[i];});
    }

    // Heartbeat: slow 2s pulse superimposed on everything
    const beat=.5+.5*Math.sin(t*Math.PI); // 0..1..0 every 2s

    // Phase envelopes (cp 0..1 across 12s cycle)
    const idle       = 1-smoothstep(.1,.2,cp);                         // settling at start
    const pProbe     = smoothstep(.15,.3,cp)*(1-smoothstep(.3,.45,cp));  // radial scan
    const pAwake     = smoothstep(.18,.38,cp)*(1-smoothstep(.85,1,cp)); // base chunk lighting
    const pAttract   = smoothstep(.40,.55,cp);                         // 0→1 as top-K fly in
    const pConverge  = smoothstep(.52,.60,cp)*(1-smoothstep(.60,.68,cp)); // brief flash
    const pMorph     = smoothstep(.58,.68,cp);                         // text lines dissolve
    const pAttn      = smoothstep(.62,.72,cp)*(1-smoothstep(.83,.90,cp));// attention visible
    const pCascade   = smoothstep(.68,.85,cp);                          // residual flow
    const pEject     = smoothstep(.84,.90,cp)*(1-smoothstep(.92,.98,cp));// answer bursts
    const pReset     = smoothstep(.92,1.0,cp);                          // fade to ambient

    // === CAMERA ===
    // Wide until .55, then smoothly to near at .62, hold until .85, then back to wide.
    let camU=0;
    if(cp<.55)camU=0;
    else if(cp<.65)camU=smoothstep(.55,.65,cp);
    else if(cp<.85)camU=1;
    else camU=1-smoothstep(.85,.95,cp);
    const camPos=lerpVec(CAM_WIDE,CAM_NEAR,camU);
    const parallax=1-camU;
    camera.position.x+=((camPos.x+hmx*5*parallax)-camera.position.x)*.055;
    camera.position.y+=((camPos.y+(-hmy*3+3)*parallax)-camera.position.y)*.055;
    camera.position.z+=(camPos.z-camera.position.z)*.055;
    camera.lookAt(q.g.position.x,q.g.position.y*(1-camU),0);

    // === QUERY ===
    // Heartbeat pulse always. Extra bright during probe and convergence.
    const qP=.25+.15*beat+.4*pProbe+.7*pConverge;
    q.f.material.opacity=qP*(1-pMorph*.6);
    q.b.material.opacity=.55+.4*(pProbe+pConverge);
    q.g.scale.setScalar(1+.06*pProbe+.12*pConverge);
    // Text lines fade out during morph
    const textFade=1-pMorph;
    qLines.forEach((ln,i)=>{
      ln.material.opacity=.55*textFade*(.85+.15*Math.sin(t*1.5+i*.4));
      // During morph, lines shift down slightly as if dissolving
      ln.position.y=(1.4-i*.9)-pMorph*.3;
    });

    // === PROBE RING ===
    probe.scale.setScalar(2+34*smoothstep(.15,.35,cp));
    probe.material.opacity=.6*pProbe;

    // === CONVERGENCE FLASH ===
    flash.scale.setScalar(4+28*pConverge);
    flash.material.opacity=pConverge*.9;

    // === CHUNKS: base pulse, top-K highlight, then physical pull to query ===
    CH.forEach((c,i)=>{
      const basePulse=.08+.05*Math.sin(t*.4+c.ph)+.06*beat;
      let tFill=basePulse, tBord=.2;
      if(c.top){
        const rb=(K-c.rank)/K;
        const lit=pAwake*rb;
        tFill=basePulse+.5*lit;
        tBord=.2+.7*lit;

        // Physical attraction toward query
        const attr=smoothstep(.40,.58,cp); // 0→1 through attract phase
        const tx=c.bx*(1-attr), ty=c.by*(1-attr), tz=c.bz*(1-attr);
        c.g.position.x+=(tx+Math.cos(t*.25+c.ph)*.15*(1-attr)-c.g.position.x)*.12;
        c.g.position.y+=(ty+Math.sin(t*.3+c.ph)*.25*(1-attr)-c.g.position.y)*.12;
        c.g.position.z+=(tz-c.g.position.z)*.12;
        // Scale shrinks as they approach convergence
        const scl=1-attr*.7;
        c.g.scale.setScalar(scl);
      }else{
        c.g.position.x+=(c.bx+Math.cos(t*.25+c.ph)*.15-c.g.position.x)*.06;
        c.g.position.y+=(c.by+Math.sin(t*.3+c.ph)*.25-c.g.position.y)*.06;
        c.g.position.z+=(c.bz-c.g.position.z)*.06;
        c.g.scale.setScalar(1);
      }
      // Fade out everything during morph/attention
      const vis=(1-pMorph*.95)*(1-pAttn*.85);
      c.f.material.opacity+=(tFill*vis-c.f.material.opacity)*.12;
      c.b.material.opacity+=(tBord*vis-c.b.material.opacity)*.12;
    });

    // === TRAILS (particle trails behind top-K chunks during attraction) ===
    trails.forEach((tr,i)=>{
      if(tr.chunkIdx===undefined||!CH[tr.chunkIdx]){tr.mat.opacity=0;return;}
      const c=CH[tr.chunkIdx];
      // Record position every frame during attract phase
      if(pAttract>.1&&pAttract<.98){
        tr.history.push({x:c.g.position.x,y:c.g.position.y,z:c.g.position.z});
        if(tr.history.length>TRAIL_LEN)tr.history.shift();
      }else if(pReset>.5){
        tr.history=[];
      }
      // Update geometry
      const arr=tr.geo.attributes.position.array;
      const fillN=Math.min(tr.history.length,TRAIL_LEN);
      for(let s=0;s<TRAIL_LEN;s++){
        const h=tr.history[s]||(tr.history[tr.history.length-1]||{x:0,y:0,z:0});
        arr[s*3]=h.x;arr[s*3+1]=h.y;arr[s*3+2]=h.z;
      }
      tr.geo.attributes.position.needsUpdate=true;
      tr.mat.opacity=.7*pAttract*(1-pReset);
    });

    // === ATTENTION STACK (residual stream) ===
    attnGroup.visible=pMorph>.01||pAttn>.01;
    const outlines=attnGroup.children.filter(ch=>ch.type==='LineLoop');
    if(attnGroup.visible){
      attnGroup.scale.setScalar(.4+.6*pMorph);
      // Column outlines fade in with morph
      outlines.forEach((o,ci)=>{
        o.material.opacity=.35*pMorph*(.7+.3*Math.sin(t*.6+ci*.3));
      });
      // Cells: cascade animation — a wave travels column-by-column from left to right
      // Cascade position: during pCascade (0→1), wave moves across all columns
      const wave=pCascade*COLS;
      attnCells.forEach(c=>{
        const dcol=Math.abs(c.col-wave);
        const near=Math.max(0,1-dcol/2.2);
        const pulse=.45+.55*Math.sin(t*2.2+c.ph);
        const tgt=pMorph*(.12+.05*beat) + pAttn*.3 + near*.8*pulse*pAttn;
        c.m.material.opacity+=(tgt-c.m.material.opacity)*.2;
      });
      // Flow lines between columns pulse as wave passes
      flowLines.forEach(fl=>{
        const dist=Math.abs(fl.col+.5-wave);
        const near=Math.max(0,1-dist/1.5);
        fl.mat.opacity=.7*near*pAttn;
      });
    }else{
      attnCells.forEach(c=>c.m.material.opacity+=(-c.m.material.opacity)*.3);
      flowLines.forEach(fl=>fl.mat.opacity+=(-fl.mat.opacity)*.3);
      outlines.forEach(o=>o.material.opacity+=(-o.material.opacity)*.3);
    }

    // === ANSWER EJECTION ===
    // Answer starts at query position (z pushed toward camera), then flies to right.
    const eject=smoothstep(.84,.92,cp);     // 0→1 ejection
    const settle=smoothstep(.90,.98,cp);    // 0→1 settles to final position
    if(pEject>.01||settle>.01){
      a.g.position.x=0+eject*(28-0)*settle + (1-settle)*0;
      a.g.position.z=eject*8*(1-settle) + settle*0;
      a.g.scale.setScalar(.6+.5*pEject);
    }else{
      a.g.position.set(28,0,0);a.g.scale.setScalar(1);
    }
    const aVis=pEject*(.6+.4*beat)+settle*.8*(1-smoothstep(.97,1,cp));
    a.f.material.opacity=.45*aVis;
    a.b.material.opacity=.95*aVis;
    aL.forEach(ln=>ln.material.opacity=.55*aVis);

    // === AMBIENT PARTICLES ===
    const pp=pG.attributes.position.array;for(let i=0;i<PN;i++){pp[i*3]+=.04;if(pp[i*3]>60)pp[i*3]=-60;}
    pG.attributes.position.needsUpdate=true;
    particles.material.opacity=.45*(1-pMorph*.6)*(1-pAttn*.4);
  }};
}

// ─────────────────────────────────────────────────────────
// SCENE 2: AGENT GRAPH (LangGraph-style nodes with messages)
// ─────────────────────────────────────────────────────────
function buildAgents(){
  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(72,GW()/GH(),.1,500);
  camera.position.set(0,0,48);
  const COL_N=PAL.c,COL_M=PAL.q,COL_BG=PAL.bg;
  const AGENTS=[
    {name:'ROUTER',pos:[-22,0,0],color:PAL.q},
    {name:'RETRIEVER',pos:[-7,8,2],color:PAL.a},
    {name:'EVALUATOR',pos:[-7,-8,2],color:PAL.c},
    {name:'GENERATOR',pos:[8,0,0],color:PAL.accent},
    {name:'TOOLS',pos:[-7,0,-6],color:PAL.bg},
    {name:'OUTPUT',pos:[22,0,0],color:PAL.a},
  ];
  const EDGES=[[0,1],[0,2],[1,3],[2,3],[0,4],[4,3],[3,5],[2,1]];
  const nodes=[];
  AGENTS.forEach(a=>{
    const g=new THREE.Group();g.position.set(...a.pos);
    const ring=new THREE.Mesh(new THREE.RingGeometry(1.8,2.2,32),new THREE.MeshBasicMaterial({color:a.color,transparent:true,opacity:.55,side:THREE.DoubleSide}));
    const core=new THREE.Mesh(new THREE.CircleGeometry(1.4,24),new THREE.MeshBasicMaterial({color:a.color,transparent:true,opacity:.25}));
    g.add(ring);g.add(core);
    scene.add(g);nodes.push({g,ring,core,base:[...a.pos],ph:Math.random()*Math.PI*2});
  });
  // Edges as lines
  const edgeLines=[];
  EDGES.forEach(([i,j])=>{
    const a=AGENTS[i].pos,b=AGENTS[j].pos;
    const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a),new THREE.Vector3(...b)]);
    const mat=new THREE.LineBasicMaterial({color:COL_N,transparent:true,opacity:.15});
    scene.add(new THREE.Line(geo,mat));edgeLines.push({mat});
  });
  // Moving messages along edges
  const msgs=EDGES.map(([i,j])=>{
    const sph=new THREE.Mesh(new THREE.SphereGeometry(.35,16,16),new THREE.MeshBasicMaterial({color:COL_M,transparent:true,opacity:0}));
    scene.add(sph);
    return {sph,from:i,to:j,u:Math.random(),speed:.006+Math.random()*.008,delay:Math.random()*3};
  });
  const PN=200,pP=new Float32Array(PN*3);
  for(let i=0;i<PN;i++){pP[i*3]=-40+Math.random()*80;pP[i*3+1]=-20+Math.random()*40;pP[i*3+2]=-25+Math.random()*25;}
  const pG=new THREE.BufferGeometry();pG.setAttribute('position',new THREE.BufferAttribute(pP,3));
  scene.add(new THREE.Points(pG,new THREE.PointsMaterial({color:COL_BG,size:.12,transparent:true,opacity:.4})));
  let t=0;
  return {scene,camera,animate:()=>{
    t+=.012;
    nodes.forEach(n=>{const s=1+.08*Math.sin(t*.8+n.ph);n.ring.scale.setScalar(s);n.core.material.opacity=.2+.15*Math.sin(t*.8+n.ph);n.g.position.y=n.base[1]+.3*Math.sin(t*.3+n.ph);});
    msgs.forEach(m=>{
      if(t<m.delay){m.sph.material.opacity=0;return;}
      m.u+=m.speed;if(m.u>1.1){m.u=-.1;}
      const a=AGENTS[m.from].pos,b=AGENTS[m.to].pos;
      const u=Math.max(0,Math.min(1,m.u));
      m.sph.position.set(a[0]+(b[0]-a[0])*u,a[1]+(b[1]-a[1])*u,a[2]+(b[2]-a[2])*u);
      m.sph.material.opacity=.9*(1-Math.abs(u-.5)*1.6);
    });
    const pp=pG.attributes.position.array;for(let i=0;i<PN;i++){pp[i*3]+=.03;if(pp[i*3]>40)pp[i*3]=-40;}pG.attributes.position.needsUpdate=true;
    camera.position.x+=(hmx*5-camera.position.x)*.04;camera.position.y+=(-hmy*3-camera.position.y)*.04;camera.lookAt(0,0,0);
  }};
}

// ─────────────────────────────────────────────────────────
// SCENE 3: ATTENTION GRID (mini attention matrices lighting up)
// ─────────────────────────────────────────────────────────
function buildAttn(){
  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(60,GW()/GH(),.1,500);
  camera.position.set(0,0,60);
  const LAYERS=6,HEADS=6,CELL_SIZE=6.8,CELL_PAD=.6,HEAD_SIZE=.75;
  const mats=[];
  const gx=(LAYERS-1)*CELL_SIZE/2, gy=(HEADS-1)*CELL_SIZE/2;
  for(let l=0;l<LAYERS;l++){
    for(let h=0;h<HEADS;h++){
      const grp=new THREE.Group();
      grp.position.set(l*CELL_SIZE-gx,h*CELL_SIZE-gy,-10+Math.random()*8);
      // 4x4 mini attention matrix
      const N=4;
      const cells=[];
      for(let r=0;r<N;r++)for(let c=0;c<N;c++){
        const m=new THREE.Mesh(new THREE.PlaneGeometry(HEAD_SIZE-.08,HEAD_SIZE-.08),new THREE.MeshBasicMaterial({color:PAL.a,transparent:true,opacity:.15}));
        m.position.set((c-(N-1)/2)*HEAD_SIZE,(r-(N-1)/2)*HEAD_SIZE,0);
        grp.add(m);cells.push({m,phase:(l*HEADS+h)*.3+r*.1+c*.15});
      }
      // outline
      const w=N*HEAD_SIZE+CELL_PAD;
      grp.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-w/2,-w/2,0),new THREE.Vector3(w/2,-w/2,0),new THREE.Vector3(w/2,w/2,0),new THREE.Vector3(-w/2,w/2,0)]),new THREE.LineBasicMaterial({color:PAL.a,transparent:true,opacity:.25})));
      scene.add(grp);mats.push({grp,cells,ph:Math.random()*Math.PI*2});
    }
  }
  // "scanner" — a highlight that sweeps through layers left→right
  const scanMat=new THREE.MeshBasicMaterial({color:PAL.q,transparent:true,opacity:.08});
  const scanner=new THREE.Mesh(new THREE.PlaneGeometry(CELL_SIZE,HEADS*CELL_SIZE),scanMat);
  scanner.position.z=-5;scene.add(scanner);
  const PN=180,pP=new Float32Array(PN*3);
  for(let i=0;i<PN;i++){pP[i*3]=-50+Math.random()*100;pP[i*3+1]=-25+Math.random()*50;pP[i*3+2]=-30+Math.random()*20;}
  const pG=new THREE.BufferGeometry();pG.setAttribute('position',new THREE.BufferAttribute(pP,3));
  scene.add(new THREE.Points(pG,new THREE.PointsMaterial({color:PAL.bg,size:.14,transparent:true,opacity:.45})));
  let t=0;
  return {scene,camera,animate:()=>{
    t+=.013;
    const sx=(t%4)/4; // scan period
    scanner.position.x=-gx-CELL_SIZE/2+sx*(LAYERS*CELL_SIZE);
    mats.forEach(m=>{
      const dx=Math.abs(m.grp.position.x-scanner.position.x);
      const near=Math.max(0,1-dx/(CELL_SIZE*1.8));
      m.cells.forEach((c,i)=>{
        const base=.12+.12*Math.sin(t*1.1+c.phase);
        const tgt=base+near*.55*(.5+.5*Math.sin(t*3+c.phase*1.3));
        c.m.material.opacity+=(tgt-c.m.material.opacity)*.15;
      });
      m.grp.rotation.z=.02*Math.sin(t*.3+m.ph);
    });
    const pp=pG.attributes.position.array;for(let i=0;i<PN;i++){pp[i*3]+=.04;if(pp[i*3]>50)pp[i*3]=-50;}pG.attributes.position.needsUpdate=true;
    camera.position.x+=(hmx*6-camera.position.x)*.04;camera.position.y+=(-hmy*4-camera.position.y)*.04;camera.lookAt(0,0,0);
  }};
}

// ─────────────────────────────────────────────────────────
// SCENE 4: TOKEN PIPELINE (horizontal flow with stage labels)
// ─────────────────────────────────────────────────────────
function buildPipeline(){
  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(70,GW()/GH(),.1,500);
  camera.position.set(0,0,50);
  const STAGES=[
    {name:'INPUT',x:-28,color:PAL.c},
    {name:'EMBED',x:-14,color:PAL.a},
    {name:'ATTEND',x:0,color:PAL.q},
    {name:'FFN',x:14,color:PAL.accent},
    {name:'OUTPUT',x:28,color:PAL.a},
  ];
  // Draw stage bars
  STAGES.forEach(s=>{
    const bar=new THREE.Mesh(new THREE.PlaneGeometry(1,24),new THREE.MeshBasicMaterial({color:s.color,transparent:true,opacity:.25}));
    bar.position.x=s.x;scene.add(bar);
    // top label line
    const lab=new THREE.Mesh(new THREE.PlaneGeometry(6,.3),new THREE.MeshBasicMaterial({color:s.color,transparent:true,opacity:.6}));
    lab.position.set(s.x,13.5,0);scene.add(lab);
    // a row of tick marks
    for(let i=-4;i<=4;i++){
      const tk=new THREE.Mesh(new THREE.PlaneGeometry(.4,.08),new THREE.MeshBasicMaterial({color:s.color,transparent:true,opacity:.35}));
      tk.position.set(s.x,i*2.3,0);scene.add(tk);
    }
  });
  // Tokens flowing from left to right
  const TOKENS=[];const TC=40;
  for(let i=0;i<TC;i++){
    const col=[PAL.c,PAL.a,PAL.q,PAL.accent][Math.floor(Math.random()*4)];
    const tk=new THREE.Mesh(new THREE.CircleGeometry(.3,12),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.8}));
    scene.add(tk);
    TOKENS.push({mesh:tk,u:Math.random(),speed:.0015+Math.random()*.003,y:(Math.random()-.5)*16,z:(Math.random()-.5)*10,color:col});
  }
  // Connections between stages (horizontal lines appearing as tokens pass through)
  const trails=[];
  for(let i=0;i<TC;i++){
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(3*6),3));
    const mat=new THREE.LineBasicMaterial({color:TOKENS[i].color,transparent:true,opacity:0});
    scene.add(new THREE.Line(geo,mat));trails.push({geo,mat});
  }
  const PN=140,pP=new Float32Array(PN*3);
  for(let i=0;i<PN;i++){pP[i*3]=-40+Math.random()*80;pP[i*3+1]=-18+Math.random()*36;pP[i*3+2]=-25+Math.random()*25;}
  const pG=new THREE.BufferGeometry();pG.setAttribute('position',new THREE.BufferAttribute(pP,3));
  scene.add(new THREE.Points(pG,new THREE.PointsMaterial({color:PAL.bg,size:.12,transparent:true,opacity:.4})));
  return {scene,camera,animate:()=>{
    TOKENS.forEach((tk,i)=>{
      tk.u+=tk.speed;if(tk.u>1.05)tk.u=-.05;
      const u=tk.u;
      const x=-32+u*64;
      tk.mesh.position.set(x,tk.y,tk.z);
      // Pulse through stages
      const nearStage=STAGES.reduce((best,s)=>{const d=Math.abs(x-s.x);return d<best.d?{d,stage:s}:best;},{d:999,stage:null});
      const glow=Math.max(0,1-nearStage.d/3);
      tk.mesh.material.opacity=.4+.5*glow;
      tk.mesh.scale.setScalar(1+.6*glow);
      // trail behind each token
      const tp=trails[i].geo.attributes.position.array;
      tp[0]=x-2.5;tp[1]=tk.y;tp[2]=tk.z;
      tp[3]=x;tp[4]=tk.y;tp[5]=tk.z;
      trails[i].geo.attributes.position.needsUpdate=true;
      trails[i].mat.opacity=.3+.4*glow;
    });
    const pp=pG.attributes.position.array;for(let i=0;i<PN;i++){pp[i*3]+=.03;if(pp[i*3]>40)pp[i*3]=-40;}pG.attributes.position.needsUpdate=true;
    camera.position.x+=(hmx*5-camera.position.x)*.04;camera.position.y+=(-hmy*3-camera.position.y)*.04;camera.lookAt(0,0,0);
  }};
}

// ─────────────────────────────────────────────────────────
// SCENE METADATA
// ─────────────────────────────────────────────────────────
const SCENES={
  rag:{
    build:buildRAG,
    tag:'RAG → ATTENTION',
    note:'Two-act narrative: <strong>Act 1 (0-6s)</strong> — query token emits a retrieval probe, top-8 chunks light up with softmax-ranked intensity, QK arcs draw, answer materializes. <strong>Act 2 (6-12s)</strong> — camera zooms into the query, a 4×4 grid of transformer attention heads materializes inside it with a scanning sweep, then the camera pulls back and a new cycle begins. Outside view → inside view. <span class="mono">Thematic for:</span> CiteIQ, the full RAG stack, transformer internals.',
    spec:[['K (top-K)','8'],['Chunks','80'],['Cycle','14s'],['Attn heads','16'],['Story','retrieval + inside-the-LLM']]
  },
  agents:{
    build:buildAgents,
    tag:'AGENT GRAPH',
    note:'Six labeled agents (Router, Retriever, Evaluator, Generator, Tools, Output) with <strong>messages flowing along the edges</strong> between them. Continuous traffic — no cycle reset. <span class="mono">Thematic for:</span> LangGraph orchestration, CrewAI systems, multi-agent pipelines.',
    spec:[['Nodes','6'],['Edges','8'],['Live msgs','8'],['Story','orchestration']]
  },
  attn:{
    build:buildAttn,
    tag:'ATTENTION GRID',
    note:'A <strong>6×6 grid of transformer attention heads</strong>, each a 4×4 mini-matrix. A pink scanner sweeps left-to-right across layers, lighting up the attention patterns as it passes. <span class="mono">Thematic for:</span> LLM internals, interpretability, transformer math.',
    spec:[['Layers','6'],['Heads/layer','6'],['Total heads','36'],['Story','transformer depth']]
  },
  pipeline:{
    build:buildPipeline,
    tag:'TOKEN PIPELINE',
    note:'Tokens flow left-to-right through <strong>five labeled stages</strong> (Input → Embed → Attend → FFN → Output). Each token pulses and stretches as it crosses a stage boundary. <span class="mono">Thematic for:</span> generic LLM inference, data pipelines, any production system with discrete stages.',
    spec:[['Stages','5'],['Live tokens','40'],['Story','end-to-end flow'],['Feel','clean, literal']]
  }
};

function switchScene(id){
  if(raf)cancelAnimationFrame(raf);
  disposeScene(active);
  active=SCENES[id].build();
  document.getElementById('cap-tag').textContent=SCENES[id].tag;
  document.getElementById('scene-note').innerHTML=SCENES[id].note;
  document.getElementById('scene-spec').innerHTML=SCENES[id].spec.map(([k,v])=>`<div><b>${k}</b><span>${v}</span></div>`).join('');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.scene===id));
  loop();
}
function loop(){raf=requestAnimationFrame(loop);if(active&&active.scene&&active.camera){active.animate();renderer.render(active.scene,active.camera);}}

document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('.tab');if(!b)return;
  if(b.dataset.scene){switchScene(b.dataset.scene);activeId=b.dataset.scene;}
  else if(b.dataset.palette){
    PAL=PALETTES[b.dataset.palette];
    // update active styling on palette buttons
    document.querySelectorAll('[data-palette]').forEach(x=>x.classList.toggle('active',x===b));
    // rebuild current scene with new palette
    switchScene(activeId);
  }
});

// init
switchScene('rag');
</script>
